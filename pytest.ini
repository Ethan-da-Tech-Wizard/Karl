[pytest]
addopts = -m "not integration and not model"
testpaths = tests
norecursedirs = venv .venv Karl-main data scratch unsloth_compiled_cache .git .github
markers =
    integration: tests that require localhost services, external assets, or longer-running system integration
    websocket: tests that exercise the real localhost WebSocket bridge
    model: tests that require local GGUF/HF model assets
filterwarnings =
    error
    ignore:Can't initialize NVML:UserWarning:torch\.cuda
    ignore:builtin type SwigPy.* has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
    ignore:websockets\.exceptions\.InvalidStatusCode is deprecated:DeprecationWarning
    ignore:websockets\.legacy is deprecated.*:DeprecationWarning
    ignore:ConnectionClosed\.code is deprecated.*:DeprecationWarning
