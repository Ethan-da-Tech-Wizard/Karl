# QLoRA fine-tuning config template for Karl
#
# This is a starter configuration for adapter training outside the Karl app.
# Run `python training/validate_dataset.py` before training.
# Export data with:
#
#   python -c "from app.utils.training_curator import export_unsloth; export_unsloth()"
#
# The exported file uses JSONL records shaped as:
#
#   {"messages": [{"role": "...", "content": "..."}, ...]}
#
# The GGUF used by Karl is an inference artifact. For training, start from the
# HuggingFace base model, train/merge adapters, then convert back to GGUF.

# Model
model_name: "unsloth/DeepSeek-R1-Distill-Qwen-1.5B"

# Quantization
load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "bfloat16"

# LoRA adapter
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
bias: "none"
task_type: "CAUSAL_LM"

# Data
dataset: "data/training/export_unsloth.jsonl"
dataset_format: "messages"
max_seq_length: 2048

# Training
output_dir: "data/training/adapters/"
num_train_epochs: 3
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
fp16: false
bf16: false

# Logging and saving
logging_steps: 10
save_strategy: "epoch"
save_total_limit: 2
evaluation_strategy: "no"
report_to: "none"

# Local hardware notes
#
# CPU-only:
#   per_device_train_batch_size: 1
#   gradient_accumulation_steps: 8
#
# 8GB VRAM:
#   the defaults above are a reasonable starting point
#
# 4GB VRAM:
#   reduce lora_r to 8 and batch size to 1

# Post-training outline
#
# 1. Merge the adapter into the base HuggingFace model.
# 2. Save the merged model.
# 3. Convert the merged model to GGUF with llama.cpp tooling.
# 4. Put the GGUF in data/models/.
# 5. Add or update a registry entry in data/model_registry.json.
