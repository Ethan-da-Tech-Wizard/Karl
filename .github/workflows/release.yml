name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1 ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest typeguard anyio psutil pyqt6 websockets mcp
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Python tests
        env:
          QT_QPA_PLATFORM: offscreen
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: python -m pytest tests/ -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: oss/vss_extension/package-lock.json

      - name: Install Node dependencies
        working-directory: oss/vss_extension
        run: npm ci

      - name: Run Node lints
        working-directory: oss/vss_extension
        run: npx eslint .

      - name: Install vsce packager globally
        run: npm install -g @vscode/vsce

      - name: Package extension bundle
        working-directory: oss/vss_extension
        run: vsce package -o karl-${{ github.ref_name }}.vsix

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: oss/vss_extension/karl-${{ github.ref_name }}.vsix
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            Automated production release for version ${{ github.ref_name }}.
            
            Included Artifacts:
            * `karl-${{ github.ref_name }}.vsix` (VS Code Extension Bundle)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
