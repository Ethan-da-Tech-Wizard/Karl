name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1 ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest typeguard anyio psutil pyqt6 websockets mcp
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: ruff check app tests

      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: python -m pytest tests/ -q

  node-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: oss/vss_extension/package-lock.json

      - name: Install dependencies
        working-directory: oss/vss_extension
        run: npm ci

      - name: Lint with ESLint
        working-directory: oss/vss_extension
        run: npx eslint .
