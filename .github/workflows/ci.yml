name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1 ripgrep

      - name: Install Python dependencies
        # llama-cpp-python builds from source on first run; the pip cache
        # keeps the built wheel for subsequent runs. GPUtil and the training
        # extras (peft/trl/datasets) are optional at runtime and their tests
        # skip cleanly when absent.
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 websockets pytest psutil mcp \
            sentence-transformers faiss-cpu PyMuPDF python-docx \
            tqdm requests llama-cpp-python

      - name: Compile all sources
        run: python -m compileall -q app core eval training main.py

      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: python -m pytest tests/ -q
